services:
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: events_scraper
    env_file:
      - .env
    environment:
      SUPABASE_DB_URL: ${SUPABASE_DB_URL}
      DB_SSLMODE: ${DB_SSLMODE:-require}
    volumes:
      - ./LLM:/app/LLM
      - ./Scraper:/app/Scraper
      - ./Persistence:/app/Persistence
    # Remove ports line - no need to expose this service publicly
