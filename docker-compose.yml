version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: events_postgres
    environment:
      POSTGRES_DB: events_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: events_scraper
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: events_db
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./LLM:/app/LLM
      - ./Scraper:/app/Scraper
      - ./Persistence:/app/Persistence
    # Remove ports line - no need to expose this service publicly

volumes:
  postgres_data:
